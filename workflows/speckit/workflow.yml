schema_version: "1.0"
workflow:
  id: "speckit"
  name: "Spec Kit Lean Delivery Workflow"
  version: "3.0.0"
  author: "Spec Kit Team"
  description: "Runs a compact Codex delivery loop by default and keeps SDD, governance, and branch-completion stages opt-in."

context_policy:
  default:
    - "AGENTS.md"
    - ".specify/workspace.yml"
    - ".specify/memory/repository-map.md"
    - ".specify/feature.json when present as current-feature state only; do not apply stale feature risk flags to spec-kit or unrelated governance tasks"
    - "ai/workflows/task-routing.md"
  load_on_demand:
    - "ai/workflows/skill-routing.yml first when a selected stage or capability needs an internal skill path"
    - "workpack.md for compact bugfix intent, root-fix choice, write scope, and validation"
    - "plan.md/tasks.md only for standard-bugfix upgrades or full-sdd work"
    - "speckit-test-plan, quality-vision, acceptance-rubric, and ai-self-acceptance only when the selected risk or behavior change requires them"
    - "ai/workflows/gates/index.yml or select-gates first; ai/workflows/gates/* only when a selected workflow gate is needed"
    - "ai/knowledge/index.yml or select-knowledge first; ai/knowledge/* only when a selected durable guide is needed"
    - "fact-pack.md/logs/DevTools evidence only for runtime uncertainty or repeated failures"
  never_default:
    - "old specs/*"
    - "Layered SDD design history"
    - "retrospective, workflow-observer, rubric, or promotion artifacts"
    - "TEAM-README.md"
    - "ai/templates/*"

requires:
  speckit_version: ">=0.10.2"

inputs:
  spec:
    type: string
    required: true
    prompt: "Describe the change, defect, migration, integration, or validation task"
  integration:
    type: string
    default: "codex"
    enum: ["codex"]
    prompt: "Integration is fixed to Codex skills in this team distribution"
  risk_level:
    type: string
    default: "medium"
    enum: ["low", "medium", "high", "blocked"]
    prompt: "Delivery risk level"
  delivery_profile:
    type: string
    default: "auto"
    enum: ["auto", "micro-fix", "standard-bugfix-lite", "standard-bugfix", "full-sdd", "blocked-investigation", "validation-only"]
    prompt: "Workflow weight profile"
  base_branch:
    type: string
    default: ""
    prompt: "Optional override branch for explicit complete-branch"
  include_spec_docs:
    type: string
    default: "exclude"
    enum: ["ask", "include", "exclude"]
    prompt: "Whether generated spec docs should be included in commit scope"

steps:
  - id: new-workflow-preflight
    command: speckit.new-workflow-preflight
    integration: "{{ inputs.integration }}"
    input:
      args: "Before creating or overwriting active feature state, run preflight-new-workflow.ps1. If blocked, stop and report facts, blockers, and suggestions. Do not stash, clean, switch branches, delete specs, archive state, or overwrite .specify/feature.json unless the user explicitly authorizes that named action. {{ inputs.spec }}"

  - id: intake
    command: speckit.intake
    integration: "{{ inputs.integration }}"
    input:
      args: "Classify delivery_profile from repository facts and risk, not keyword matching. Prefer micro-fix or standard-bugfix-lite when the work is bounded. Upgrade to standard-bugfix/full-sdd only for public API, architecture, migration, cross-repo, identity/permission/status, real-device, or host/plugin/native delivery-chain work. {{ inputs.spec }}"

  - id: specify
    command: speckit.specify
    integration: "{{ inputs.integration }}"
    profiles: ["standard-bugfix", "full-sdd"]
    input:
      args: "Create spec.md only for work that needs a durable behavior contract. Keep it focused on scope, acceptance criteria, affected repositories from repository-map, and known risks. Do not generate review.md by default."

  - id: plan
    command: speckit.plan
    integration: "{{ inputs.integration }}"
    skip_profiles: ["validation-only", "blocked-investigation"]
    input:
      args: "Create the smallest execution artifact. Micro-fix and standard-bugfix-lite use workpack.md instead of spec.md/plan.md/tasks.md. Standard-bugfix uses plan.md with Implementation Slices and normally skips tasks.md. Full-sdd may add spec.md, plan.md, tasks.md, research, contracts, and quickstart only when required by scope or risk. Bugfix work must record Root-Fix Decision Gate in workpack.md or plan.md. Select gate packs with select-gates before loading CDP/native/plugin/real-device details."

  - id: validation
    command: speckit.validation
    integration: "{{ inputs.integration }}"
    profiles: ["validation-only"]
    input:
      args: "Run validation-only evidence collection and write validation.md. Do not make product-code changes, commit, push, merge, or complete branches."

  - id: fact-layer
    command: speckit.fact-layer
    integration: "{{ inputs.integration }}"
    profiles: ["blocked-investigation"]
    input:
      args: "Collect bounded root-cause facts, logs, runtime evidence, CDP/DOM/CSS details, and blockers required to unblock implementation. Do not patch by guessing."

  - id: tasks
    command: speckit.tasks
    integration: "{{ inputs.integration }}"
    profiles: ["full-sdd"]
    input:
      args: "Generate tasks.md only for full-sdd or when plan.md cannot hold executable slices compactly."

  - id: analyze
    command: speckit.analyze
    integration: "{{ inputs.integration }}"
    profiles: ["full-sdd"]
    input:
      args: "Analyze spec/plan/tasks consistency, root-cause evidence, Root-Fix Decision Gate, and implementation readiness before broad source changes."

  - id: checklist
    command: speckit.checklist
    integration: "{{ inputs.integration }}"
    profiles: ["full-sdd"]
    input:
      args: "Run implementation-readiness checklist gates only for full-sdd or explicitly high-risk work."

  - id: implement
    command: speckit.implement
    integration: "{{ inputs.integration }}"
    skip_profiles: ["validation-only", "blocked-investigation"]
    input:
      args: "Implement from workpack.md, plan slices, or tasks.md when present. Keep searches bounded to affected repositories. Record durable state in workflow-state.json, validation.md, and implementation-summary.md; do not create progress.md by default. After code changes, collect required validation and use speckit-ai-self-acceptance when an acceptance rubric exists. Product and plugin fixes must target repository source, not installed runtime plugin directories or built artifacts. Do not commit, push, merge, or delete branches."

  - id: acceptance
    command: speckit.acceptance
    integration: "{{ inputs.integration }}"
    skip_profiles: ["validation-only", "blocked-investigation"]
    input:
      args: "Produce concise user acceptance steps after validation.md and implementation-summary.md exist. Write acceptance.md only when durable user-facing acceptance is useful; otherwise report steps in the response. Do not create acceptance-checklist.md by default. Wait for explicit user confirmation that acceptance passes."

  - id: human-acceptance
    type: gate
    skip_profiles: ["validation-only", "blocked-investigation"]
    message: "Human acceptance must pass before optional commit, governance, or branch completion."
    options: ["approve", "reject"]
    on_reject: "retry"

conditional_stages:
  clarify: "Use only for high-impact ambiguity or owner-approved gaps."
  converge: "Use only when full-sdd/high-risk work needs a separate promised-vs-delivered reconciliation artifact; otherwise keep closure in implementation-summary.md."
  tasks: "Use for full-sdd or when plan.md lacks compact executable slices."
  analyze: "Use for full-sdd/high-risk work; standard-bugfix-lite and micro-fix should not create analysis.md by default."
  checklist: "Use for full-sdd/high-risk readiness gates; do not create implementation-readiness.md by default."
  fact-layer: "Use for repeated failures, unclear runtime behavior, service/runtime logs, or UI DOM/CSS/box metrics."
  validation: "Use for validation-only work."
  acceptance-rubric: "Use only for complex acceptance, UI quality, public contract, or high-risk validation."
  quality-vision: "Use only for UI/UX/copy/parity work."
  simplify: "Use after acceptance only when behavior-preserving cleanup has clear value."
  test-hardening: "Use only when extra regression protection reduces real risk."
  retrospective: "Opt-in process governance; write workflow-record/improvement/knowledge candidates only when explicitly requested or when improving Spec Kit itself."
  workflow-observer: "Opt-in process debugging; not part of default delivery."
  promote-lessons: "Use only for human-approved improvement candidates."
  promote-knowledge: "Use only for human-approved knowledge-candidates.md entries; pending or rejected entries are never promoted."
  commit: "Opt-in local git stage after validation and user acceptance; does not require retrospective or workflow-observer artifacts."
  post-commit-self-check: "Opt-in release/strict-mode self-check."
  rubric-score: "Opt-in release/strict-mode rubric."
  complete-branch: "Opt-in branch-state mutation after explicit human approval."

stage_gate_policy:
  new_workflow_preflight:
    command: "preflight-new-workflow"
    stage: "new-workflow-preflight"
    rule: "Before intake writes or overwrites active feature state, block dirty worktrees, non-base branches, unfinished .specify/feature.json state, and unresolved workflow runs."
  automatic_stage_continuation:
    rule: "Every default stage auto-continues to the next structurally required default stage when no human acceptance, clarification, owner decision, high-risk confirmation, unavailable external dependency, build/validation failure, unresolved blocker, source/runtime delivery-chain gap, or explicit user pause remains."
    execution_contract: "Auto-continue means execute the next default stage in the same agent turn; opt-in governance and branch stages require explicit user request."
  next_stage_routing:
    micro-fix:
      after_plan: "implement when workpack or micro-fix evidence names files, validation, stop conditions, and root cause."
    standard-bugfix-lite:
      after_plan: "implement when workpack.md covers root cause, one slice, validation, and acceptance summary; upgrade when high-risk gates or missing evidence appear."
    standard-bugfix:
      after_plan: "implement when plan.md has complete Implementation Slices; tasks first only when slices are missing or too broad."
    full-sdd:
      after_plan: "tasks"
      before_implement: "tasks -> analyze -> checklist must complete."
    blocked-investigation:
      after_plan: "fact-layer or bounded-investigation; do not implement until root cause and validation condition are known."
    validation-only:
      after_plan: "validation"
  hard_implementation_preflight:
    command: "validate-feature-artifacts"
    stage: "implement"
    rule: "Infer delivery_profile, risk_level, and risk_flags from .specify/feature.json when CLI inputs are auto/empty. Block implementation when required prior-stage artifacts are missing."
  deterministic_next_stage:
    command: "resolve-next-stage"
    rule: "Resolve current_stage, next_stage, blockers, required_human_action, commands_to_run, and missing_artifacts from feature state and artifacts before auto-continuation."
  workflow_hooks:
    command: "specify workflow invoke-hooks"
    rule: "Workflow hooks are optional and default off. Load .specify/workflow-hooks.yml only when present. Matching workflow-shell hooks run synchronously; matching workflow-agent-chain hooks run serial Codex skill chains. Continue only when auto_continue=true."
  generated_context_drift:
    command: "validate-generated-context"
    rule: "After spec-kit template changes or shared-infra refresh, verify generated context phrases before relying on default context."
  context_budget_drift:
    command: "validate-context-budget"
    rule: "After template, command, gate, or knowledge changes, verify default context and selected skill files stay compact."
  workflow_gate_selection:
    command: "select-gates"
    rule: "For plan, implement, and validation work, select gate packs by stage, affected repositories, risk flags, capability tags, and AI Context Contract terms before loading host CDP, runtime sync, native bridge, Qt parity, or real-device details. Selected host CDP gates may use ensure-host-cdp and inspect-host-cdp-target."
  root_fix_decision_gate:
    command: "Root-Fix Decision Gate"
    rule: "For bugfix work, compare Root fix, Mitigation, Compatibility fallback, and Containment when applicable before implementation. Non-root-fix selections must record residual risk and follow-up root-fix route."
  knowledge_index_drift:
    command: "validate-knowledge-index"
    rule: "After ai/knowledge/index.yml or guide changes, verify selected guides exist, repository keys match workspace.yml, guides stay bounded, and no machine-specific paths are stored."
  final_response_guard:
    command: "inspect-workflow-closure"
    rule: "Before final response, inspect closure only when feature state indicates accepted implementation, commit, strict self-check, or rubric work. Governance stages are not required unless explicitly selected."
  implementation_summary:
    command: "implementation-summary.md"
    rule: "After implementation, maintain implementation-summary.md as the compact final actual implementation index: final solution, changed files, mechanism changes, validation summary, residual risks, follow-ups, and evidence links."
