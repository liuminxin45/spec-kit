schema_version: "1.0"
workflow:
  id: "speckit"
  name: "CoreServicesLib Lean AI Coding Cycle"
  version: "2.0.0"
  author: "CoreServicesLib Team"
  description: "Runs a minimal AI coding loop by default and upgrades to heavier Spec Kit stages only when risk or missing evidence requires it."

context_policy:
  default:
    - "AGENTS.md"
    - ".specify/workspace.yml"
    - ".specify/memory/repository-map.md"
    - ".specify/feature.json when present as current-feature state only; do not apply stale feature risk flags to tools/spec-kit or unrelated governance tasks"
    - "ai/workflows/task-routing.md"
  load_on_demand:
    - "ai/tools/* only when MCP/tool policy is needed"
    - "ai/knowledge/index.yml or select-knowledge first; ai/knowledge/* only when a selected durable guide is needed"
    - "fact-pack.md/logs/DevTools evidence only for runtime or repeated failures"
    - "workflow-record/improvement-candidates only during retrospective or explicit lesson promotion work"
  never_default:
    - "old specs/*"
    - "Layered SDD design history"
    - "TEAM-README.md"
    - "ai/templates/*"

requires:
  speckit_version: ">=0.7.2"

inputs:
  spec:
    type: string
    required: true
    prompt: "Describe the change, defect, migration, integration, or validation task"
  integration:
    type: string
    default: "codex"
    enum: ["codex", "claude"]
    prompt: "Integration to use; codex is the default and claude selects Claude Code skills"
  risk_level:
    type: string
    default: "medium"
    enum: ["low", "medium", "high", "blocked"]
    prompt: "Delivery risk level"
  delivery_profile:
    type: string
    default: "auto"
    enum: ["auto", "micro-fix", "standard-bugfix", "full-sdd", "blocked-investigation", "validation-only"]
    prompt: "Workflow weight profile"
  base_branch:
    type: string
    default: "master"
    prompt: "Base branch for final local cherry-pick"
  include_spec_docs:
    type: string
    default: "ask"
    enum: ["ask", "include", "exclude"]
    prompt: "Whether generated spec docs should be included in commit scope"

steps:
  - id: intake
    command: speckit.intake
    integration: "{{ inputs.integration }}"
    input:
      args: "Classify risk/profile from facts, not keyword matching. Record delivery_profile in .specify/feature.json. Use micro-fix for small evidenced internal fixes; standard-bugfix for compact behavior fixes; full-sdd for public API, architecture, migration, cross-repo, real-device, or broad UI/Biz/Libs boundary work; blocked-investigation when root cause or validation evidence is missing. {{ inputs.spec }}"

  - id: specify
    command: speckit.specify
    integration: "{{ inputs.integration }}"
    input:
      args: "Create only the minimum intent artifact required by the selected profile. For micro-fix, use lightweight progress/micro-fix notes. For standard/full work, create or update spec.md with scope, non-goals, acceptance, affected repos from repository-map, and known risks. Do not scan the workspace to infer repository roles. Do not push or create remote tracking."

  - id: plan
    command: speckit.plan
    integration: "{{ inputs.integration }}"
    input:
      args: "Create the smallest executable plan. Standard-bugfix may keep Implementation Slices inside plan.md and skip tasks.md. Full-sdd may add tasks.md/research/contracts only when required by risk or scope. For UI/layout repeated failure, require fact-layer evidence before another patch. For source/runtime/plugin work, plan repository source-file edits, not installed runtime plugin directories or built artifacts."

  - id: implement
    command: speckit.implement
    integration: "{{ inputs.integration }}"
    input:
      args: "Implement from plan slices, tasks.md when present, or micro-fix evidence. Keep searches bounded to affected repos. Update progress.md. Required validation belongs here. If a first UI/CSS/layout patch fails, stop and collect/request runtime DOM/CSS/computed style/box metrics before a second patch. Product and plugin fixes must target repository source, not installed runtime plugin directories or built artifacts. For host-embedded frontend plugin source edits, follow source edit -> frontend build -> direct runtime replacement -> real host CDP verification. For native plugin source edits, build the .plugin artifact because native output cannot hot update. Do not commit, push, merge, or delete branches."

  - id: acceptance
    command: speckit.acceptance
    integration: "{{ inputs.integration }}"
    requires_confirmation: true
    input:
      args: "Generate executable user acceptance steps and expected results. Pair validation.md with acceptance.md. Create evidence.md/fact-pack.md only when raw evidence is too large or runtime facts are required. Wait for explicit user confirmation that acceptance passes."

  - id: retrospective
    command: speckit.retrospective
    integration: "{{ inputs.integration }}"
    input:
      args: "After acceptance and before commit, write Chinese-first workflow-record.md and improvement-candidates.md. Record key user inputs, AI outputs, validation evidence, errors/rework, Accepted Gaps, local-only/ignored artifact visibility, and only high-value improvement candidates. Use an automation-first filter: prefer scripts, deterministic checks, generated facts, or rule-based gates over LLM/AI judgment when possible. Do not promote lessons, commit, or mutate branches/remotes."

  - id: commit
    command: speckit.commit
    integration: "{{ inputs.integration }}"
    requires_confirmation: true
    input:
      args: "Inspect scope and source/runtime consistency only after retrospective/留痕 is complete. Require workflow-record.md and improvement-candidates.md before commit. Ask once whether spec docs are included when include_spec_docs={{ inputs.include_spec_docs }} and report ignored spec artifacts. Use the commit-message skill. Show affected repositories, staged scope, exclusions, spec-doc decision, and validation plan before final confirmation; early confirmation does not count. Do not push."

  - id: complete-branch
    command: speckit.complete-branch
    integration: "{{ inputs.integration }}"
    requires_confirmation: true
    input:
      args: "Final operation after commit and retrospective/留痕 are complete. Preflight first, classify generated/temp/excluded dirty entries, report remote divergence, then after explicit confirmation cherry-pick local spec branch commits to {{ inputs.base_branch }}, keep the spec branch, switch every affected repository back to base, and do not push or create remote tracking. Do not create merge commits."

conditional_stages:
  clarify: "Use only for high-impact ambiguity or owner-approved gaps."
  tasks: "Use for full-sdd or when plan.md lacks executable slices."
  analyze: "Required before implementation for standard-bugfix and full-sdd; optional only for micro-fix/validation-only unless risk or evidence requires it."
  checklist: "Required before implementation for full-sdd and high-risk UI/runtime/cross-repo/SDK-Biz boundary work; optional otherwise."
  fact-layer: "Use for repeated failures, unclear runtime behavior, SDK/Biz logs, or UI DOM/CSS/box metrics."
  validation: "Use for validation-only work."
  simplify: "Use after acceptance only when behavior-preserving cleanup has clear value."
  test-hardening: "Use only when extra regression protection reduces real risk."
  promote-lessons: "Use only for human-approved improvement candidates."

stage_gate_policy:
  automatic_stage_continuation:
    rule: "Every stage auto-continues to the next structurally required stage when no human acceptance, clarification, owner decision, high-risk confirmation, unavailable external dependency, build/validation failure, unresolved blocker, source/runtime delivery-chain gap, or explicit user pause remains."
    execution_contract: "Auto-continue means execute the next stage in the same agent turn. Prefer invoking the next stage command/skill; if the integration cannot invoke commands programmatically, load the next stage command template and perform its steps inline. A plain completion report that says the next stage will run is non-compliant."
    stop_contract: "If the agent cannot continue, it must not claim automatic entry. It must write blockers and next_required_human_action; a plain stage-complete summary is not sufficient."
  next_stage_routing:
    micro-fix:
      after_plan: "implement when micro-fix evidence names files, validation, stop conditions, and root cause; otherwise return to micro-fix/plan."
    standard-bugfix:
      after_plan: "analyze when plan.md has complete Implementation Slices; tasks first when slices are missing or too broad."
      before_implement: "run analyze; run checklist when risk is high, cross-repo, UI/runtime, SDK/Biz boundary, or validation readiness is non-trivial."
    full-sdd:
      after_plan: "tasks"
      before_implement: "tasks -> analyze -> checklist must complete; implement preflight must find tasks.md, analysis.md, checklists/implementation-readiness.md, and workflow-state.json."
    blocked-investigation:
      after_plan: "fact-layer or bounded-investigation; do not implement until root cause and validation condition are known."
    validation-only:
      after_plan: "validation"
  hard_implementation_preflight:
    command: "validate-feature-artifacts"
    stage: "implement"
    rule: "Infer delivery_profile, risk_level, and risk_flags from .specify/feature.json when CLI inputs are auto/empty. Block implementation when required prior-stage artifacts are missing."
  generated_context_drift:
    command: "validate-generated-context"
    rule: "After tools/spec-kit template changes or shared-infra refresh, check AGENTS.md, .specify/memory/repository-map.md, .specify/templates/layer-manifest.yml, ai/workflows/task-routing.md, and ai/rules/ai-coding-rules.md for required gate phrases before relying on default context."
  knowledge_index_drift:
    command: "validate-knowledge-index"
    rule: "After ai/knowledge/index.yml or guide changes, verify selected guides exist, repository keys match workspace.yml, guides stay bounded, and no machine-specific paths are stored."
  desktop_shell_cdp_target:
    command: "inspect-desktop-shell-cdp-target"
    rule: "Before host-embedded UI CDP evidence, list /json/list page targets and record selected target id/title/url/webSocketDebuggerUrl. Product UI validation rejects Plugin Workbench, base-win.html, DevTools, blank, and unrelated targets."
  frontend_runtime_delivery_chain:
    command: "sync-ui-runtime-artifacts"
    rule: "After frontend plugin source edits, build source output, mirror it into the explicit host runtime plugin directory, then verify the real host target through CDP and record loaded resource evidence."
