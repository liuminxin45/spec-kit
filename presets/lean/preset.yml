schema_version: "1.0"

preset:
  id: "lean"
  name: "CoreServicesLib Lean Workflow"
  version: "1.3.0"
  description: "Minimal team workflow for small scoped CoreServicesLib changes with intake routing, validation, and test-case closure"
  author: "CoreServicesLib Team"
  repository: "project-local"
  license: "MIT"

requires:
  speckit_version: ">=0.6.0"

provides:
  templates:
    - type: "command"
      name: "speckit.specify"
      file: "commands/speckit.specify.md"
      description: "Lean team specify - create spec.md for a small capability"
      replaces: "speckit.specify"

    - type: "command"
      name: "speckit.plan"
      file: "commands/speckit.plan.md"
      description: "Lean team plan - create plan.md with boundaries and validation"
      replaces: "speckit.plan"

    - type: "command"
      name: "speckit.tasks"
      file: "commands/speckit.tasks.md"
      description: "Lean team tasks - create focused implementation tasks"
      replaces: "speckit.tasks"

    - type: "command"
      name: "speckit.implement"
      file: "commands/speckit.implement.md"
      description: "Lean team implement - execute tasks with scoped changes"
      replaces: "speckit.implement"

    - type: "command"
      name: "speckit.constitution"
      file: "commands/speckit.constitution.md"
      description: "Lean team constitution - maintain team principles"
      replaces: "speckit.constitution"

tags:
  - "lean"
  - "generic-workspace"
  - "team"
  - "minimal"
