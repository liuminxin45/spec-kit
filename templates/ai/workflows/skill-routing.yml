schema_version: "1.0"
purpose: "Minimal map from Spec Kit routing decisions to internal Codex skills."
policy:
  default_context: false
  native_discovery_root: ".agents/skills"
  exposed_entry_skill: ".agents/skills/speckit-specify/SKILL.md"
  internal_skill_root: ".agents/spec-kit/skills"
  load_only_selected_skill: true
  selection_rule: "Use task-routing.md for profile/stage choice, then read only the matching internal skill."
  forbidden: "Do not pre-load internal skills, duplicate gate/knowledge details, or treat this map as product truth."
stage_skills:
  new-workflow-preflight: "speckit-new-workflow-preflight"
  intake: "speckit-intake"
  specify: "speckit-specify"
  clarify: "speckit-clarify"
  plan: "speckit-plan"
  tasks: "speckit-tasks"
  analyze: "speckit-analyze"
  checklist: "speckit-checklist"
  implement: "speckit-implement"
  validation: "speckit-validation"
  acceptance: "speckit-acceptance"
  simplify: "speckit-simplify"
  test-hardening: "speckit-test-hardening"
  retrospective: "speckit-retrospective"
  workflow-observer: "speckit-workflow-observer"
  promote-lessons: "speckit-promote-lessons"
  promote-knowledge: "speckit-promote-knowledge"
  commit: "speckit-commit"
  post-commit-self-check: "speckit-post-commit-self-check"
  rubric-score: "speckit-rubric-score"
  complete-branch: "speckit-complete-branch"
profile_skills:
  micro-fix: "speckit-micro-fix"
  blocked-investigation: "speckit-bounded-investigation"
  validation-only: "speckit-validation"
capability_skills:
  fact-layer:
    skill: "speckit-fact-layer"
    when:
      - "repeated same-class failure, unchanged symptom, or runtime/log evidence is needed"
  repository-map:
    skill: "speckit-repository-map"
    when:
      - "repository role, path, capability ownership, or path category facts are needed"
  knowledge-bootstrap:
    skill: "speckit-knowledge-bootstrap"
    when:
      - "workspace needs an initial or replaceable ai/knowledge base"
      - "user asks to generate, initialize, refresh, or decouple project knowledge"
      - "user asks to export, install, apply, mount, or compose a knowledge pack"
  knowledge-pack-generator:
    skill: "speckit-knowledge-pack-generator"
    when:
      - "user asks to generate a portable knowledge pack for an arbitrary project"
      - "user asks for an automated AI pack generator"
      - "project knowledge must be extracted, synthesized, and packaged through AI"
  commit-message:
    skill: "commit-message"
    when:
      - "commit message generation or validation is required"
  code-simplifier:
    skill: "code-simplifier"
    when:
      - "behavior-preserving cleanup is requested after accepted functionality"
  test-plan:
    skill: "speckit-test-plan"
    when:
      - "clarify or plan must draft or negotiate API, E2E, interface, regression, fixture, or smoke test-case plans"
  quality-vision:
    skill: "speckit-quality-vision"
    when:
      - "clarify or plan needs UI/UX quality tier, design intent, baseline screenshot, source behavior, or owner-approved N/A"
  acceptance-rubric:
    skill: "speckit-acceptance-rubric"
    when:
      - "plan must convert requirements, test plan, and quality vision into self-contained acceptance rubrics"
  ai-self-acceptance:
    skill: "speckit-ai-self-acceptance"
    when:
      - "AI has changed code and believes a slice or implementation is complete"
      - "AI acceptance PASS is required before human acceptance"
load_paths:
  stage_or_profile: ".agents/spec-kit/skills/<skill>/SKILL.md"
  capability: ".agents/spec-kit/skills/<skill>/SKILL.md"
