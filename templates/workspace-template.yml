workspace:
  root: "."
  primary_repo: "CoreRuntime"
  # Fallback only. create-spec-branch records the actual entry branch per repo.
  default_base_branch: "master"

branch_policy:
  local_only: true
  push_remote: false
  same_branch_across_repos: true
  require_clean_worktree: true
  complete_by_cherry_picking_to_base: true
  require_user_confirmation_before_cherry_pick: false
  delete_local_spec_branch_after_cherry_pick: false
  keep_local_spec_branch_after_cherry_pick: true
  # Legacy compatibility keys retained for older commands/tests. Current
  # complete-branch behavior is cherry-pick, not merge.
  complete_by_merging_to_base: false
  require_user_confirmation_before_merge: false
  require_user_confirmation_before_commit: false
  delete_local_spec_branch_after_merge: false
  keep_local_spec_branch_after_merge: true

spec_persistence:
  # How feature specs evolve after delivery:
  # - flow-back: keep feature artifacts, then promote durable lessons through retrospective.
  # - flow-forward: keep historical specs immutable and create follow-up specs for changed behavior.
  # - living-spec: maintain a current product spec in addition to feature artifacts.
  model: "flow-back"
  keep_feature_artifacts: true
  promote_only_with_human_approval: true
  durable_knowledge_target: "ai/knowledge"
  repack_after_approved_promotion: false

repositories:
  - name: "CoreRuntime"
    path: "CoreRuntime"
    role: "sdk-biz-core"
    required: true

  - name: "SdkConsumer"
    path: "SdkConsumer"
    role: "sdk-consumer"
    required: true

  - name: "JsPlugin"
    path: "JsPlugin"
    role: "js-plugin"
    required: true

  - name: "NativePlugin"
    path: "NativePlugin"
    role: "native-plugin-and-bridge"
    required: true

  - name: "PluginCommon"
    path: "PluginCommon"
    role: "shared-plugin-common"
    required: true

  - name: "FrontendPlugin"
    path: "FrontendPlugin"
    role: "frontend-plugin-targets"
    required: true

  - name: "PlatformLibs"
    path: "PlatformLibs"
    role: "windows-dependencies"
    required: true

  - name: "HostApplication"
    path: "HostApplication"
    role: "host-and-frontend-plugins"
    required: true

  - name: "spec-kit"
    path: "spec-kit"
    role: "ai-delivery-tooling"
    required: false
    participates_in_spec_branches: false
